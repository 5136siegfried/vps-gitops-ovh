---
- name: Configure OVH VPS
  hosts: vps
  become: true
  vars:
    enable_docker: true
    enable_reverse_proxy: true
    enable_monitoring: true
    enable_security: true

  roles:
    - role: common
    - role: docker
      when: enable_docker
    - role: reverse_proxy
      when: enable_reverse_proxy
    - role: monitoring
      when: enable_monitoring
    - role: security
      when: enable_security
