---
# ============================================================
# ROLE: security
# vps-security-toolkit + auditd + rkhunter + PAM policy
# ============================================================

- name: Install security packages
  ansible.builtin.apt:
    name:
      - auditd
      - audispd-plugins
      - rkhunter
      - chkrootkit
      - lynis
      - libpam-pwquality
      - acl
      - logwatch
    state: present
    update_cache: true

- name: Create toolkit directory
  ansible.builtin.file:
    path: "{{ security_toolkit_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Clone vps-security-toolkit
  ansible.builtin.git:
    repo: "{{ security_toolkit_repo }}"
    dest: "{{ security_toolkit_dir }}"
    version: main
    update: true
  register: security_toolkit_clone

- name: Create reports directory
  ansible.builtin.file:
    path: "{{ security_toolkit_report_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0750'

- name: Make audit script executable
  ansible.builtin.file:
    path: "{{ security_toolkit_dir }}/audit.sh"
    mode: '0755'

- name: Deploy audit wrapper script
  ansible.builtin.template:
    src: audit_runner.sh.j2
    dest: /usr/local/bin/vps-audit
    owner: root
    group: root
    mode: '0755'

- name: Schedule daily security audit
  ansible.builtin.cron:
    name: "VPS security audit"
    hour: "{{ security_audit_schedule_hour }}"
    minute: "{{ security_audit_schedule_minute }}"
    weekday: "{{ security_audit_schedule_weekday }}"
    user: root
    job: "/usr/local/bin/vps-audit >> {{ security_toolkit_report_dir }}/audit-$(date +\\%Y\\%m\\%d).log 2>&1"
    state: present

- name: Run initial audit
  ansible.builtin.command:
    cmd: /usr/local/bin/vps-audit
  register: security_initial_audit
  changed_when: false
  failed_when: false

- name: Show initial audit result
  ansible.builtin.debug:
    msg: "{{ security_initial_audit.stdout_lines[-5:] }}"
  when: security_initial_audit.stdout_lines is defined

- name: Deploy auditd rules
  ansible.builtin.template:
    src: audit.rules.j2
    dest: /etc/audit/rules.d/hardening.rules
    owner: root
    group: root
    mode: '0640'
  notify: Restart auditd
  when: security_auditd_enabled

- name: Enable and start auditd
  ansible.builtin.service:
    name: auditd
    state: started
    enabled: true
  when: security_auditd_enabled

- name: Update rkhunter database
  ansible.builtin.command:
    cmd: rkhunter --update
  changed_when: false
  failed_when: false
  when: security_rkhunter_enabled and security_rkhunter_update_on_install

- name: Set rkhunter baseline
  ansible.builtin.command:
    cmd: rkhunter --propupd
  changed_when: false
  when: security_rkhunter_enabled

- name: Schedule weekly rkhunter scan
  ansible.builtin.cron:
    name: "rkhunter weekly scan"
    weekday: "1"
    hour: "3"
    minute: "30"
    user: root
    job: "rkhunter --check --skip-keypress --report-warnings-only >> /var/log/rkhunter-weekly.log 2>&1"
    state: present
  when: security_rkhunter_enabled

- name: Configure password quality policy
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "^{{ item.key }}"
    line: "{{ item.key }} = {{ item.value }}"
    state: present
  loop:
    - {key: minlen, value: "14"}
    - {key: dcredit, value: "-1"}
    - {key: ucredit, value: "-1"}
    - {key: lcredit, value: "-1"}
    - {key: ocredit, value: "-1"}
    - {key: maxrepeat, value: "3"}

- name: Schedule weekly logwatch report
  ansible.builtin.cron:
    name: "Logwatch weekly"
    weekday: "1"
    hour: "6"
    minute: "0"
    user: root
    job: "logwatch --output mail --mailto root --detail high >> /var/log/logwatch-weekly.log 2>&1"
    state: present
