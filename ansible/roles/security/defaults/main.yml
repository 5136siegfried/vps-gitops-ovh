---
security_toolkit_repo: "https://github.com/5136siegfried/vps-security-toolkit"
security_toolkit_dir: /opt/vps-security-toolkit
security_toolkit_report_dir: /var/log/security-reports

security_audit_schedule_hour: "2"
security_audit_schedule_minute: "0"
security_audit_schedule_weekday: "*"

security_audit_score_threshold: 70
security_audit_alert_webhook: ""

security_auditd_enabled: true

security_rkhunter_enabled: true
security_rkhunter_update_on_install: true
