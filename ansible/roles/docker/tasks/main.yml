---
# ============================================================
# ROLE: docker
# Install Docker CE + Compose plugin, harden daemon
# ============================================================

# ── Prerequisites ────────────────────────────────────────────

- name: Remove old Docker versions if present
  apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent

- name: Install Docker dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

# ── Docker APT repository ────────────────────────────────────

- name: Create Docker keyring directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
    gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Set Docker GPG key permissions
  file:
    path: /etc/apt/keyrings/docker.gpg
    mode: '0644'

- name: Add Docker APT repository
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: |
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    mode: '0644'
  notify: update apt cache

- name: Update apt cache after adding Docker repo
  apt:
    update_cache: yes

# ── Install Docker ───────────────────────────────────────────

- name: Install Docker CE and plugins
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

# ── Daemon hardening ─────────────────────────────────────────

- name: Create Docker daemon config directory
  file:
    path: /etc/docker
    state: directory
    mode: '0755'

- name: Configure Docker daemon
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  notify: restart docker

# ── Users ─────────────────────────────────────────────────────

- name: Add deploy user to docker group
  user:
    name: "{{ deploy_user }}"
    groups: docker
    append: yes

- name: Add additional users to docker group
  user:
    name: "{{ item }}"
    groups: docker
    append: yes
  loop: "{{ docker_additional_users }}"
  when: docker_additional_users | length > 0

# ── Service ──────────────────────────────────────────────────

- name: Enable and start Docker
  service:
    name: docker
    state: started
    enabled: yes

- name: Enable containerd
  service:
    name: containerd
    state: started
    enabled: yes

# ── Maintenance ───────────────────────────────────────────────

- name: Install docker prune cron job (weekly)
  cron:
    name: "Docker system prune"
    weekday: "0"
    hour: "3"
    minute: "0"
    user: root
    job: "docker system prune -f --filter 'until=168h' >> /var/log/docker-prune.log 2>&1"
    state: present

- name: Verify Docker installation
  command: docker --version
  register: docker_version
  changed_when: false

- name: Print Docker version
  debug:
    msg: "{{ docker_version.stdout }}"
