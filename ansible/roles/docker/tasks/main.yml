---
# ============================================================
# ROLE: docker
# Install Docker CE + Compose plugin, harden daemon
# ============================================================

# ── Prerequisites ────────────────────────────────────────────

- name: Remove old Docker versions if present
  ansible.builtin.apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent

- name: Install Docker dependencies
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

# ── Docker APT repository ────────────────────────────────────

- name: Create Docker keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker APT repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: >
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    mode: '0644'
  notify: Update apt cache

- name: Update apt cache after adding Docker repo
  ansible.builtin.apt:
    update_cache: true

# ── Install Docker ───────────────────────────────────────────

- name: Install Docker CE and plugins
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

# ── Daemon hardening ─────────────────────────────────────────

- name: Create Docker daemon config directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: '0755'

- name: Configure Docker daemon
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  notify: Restart docker

# ── Users ─────────────────────────────────────────────────────

- name: Add deploy user to docker group
  ansible.builtin.user:
    name: "{{ common_deploy_user | default('deploy') }}"
    groups: docker
    append: true

- name: Add additional users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_additional_users }}"
  when: docker_additional_users | length > 0

# ── Service ──────────────────────────────────────────────────

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Enable containerd
  ansible.builtin.service:
    name: containerd
    state: started
    enabled: true

# ── Maintenance ───────────────────────────────────────────────

- name: Install docker prune cron job (weekly)
  ansible.builtin.cron:
    name: "Docker system prune"
    weekday: "0"
    hour: "3"
    minute: "0"
    user: root
    job: "docker system prune -f --filter 'until=168h' >> /var/log/docker-prune.log 2>&1"
    state: present

- name: Verify Docker installation
  ansible.builtin.command:
    cmd: docker --version
  register: docker_version_result
  changed_when: false

- name: Print Docker version
  ansible.builtin.debug:
    msg: "{{ docker_version_result.stdout }}"
