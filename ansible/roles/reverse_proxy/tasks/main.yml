---
# ============================================================
# ROLE: reverse_proxy
# Nginx + Certbot (Let's Encrypt) avec hardening TLS
# ============================================================

# ── Install ──────────────────────────────────────────────────

- name: Install nginx and certbot
  apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: yes

# ── Nginx global config ──────────────────────────────────────

- name: Deploy nginx.conf
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: '0644'
    validate: 'nginx -t -c %s'
  notify: reload nginx

- name: Deploy security headers snippet
  template:
    src: security_headers.conf.j2
    dest: /etc/nginx/snippets/security_headers.conf
    owner: root
    group: root
    mode: '0644'

- name: Deploy SSL snippet
  template:
    src: ssl_params.conf.j2
    dest: /etc/nginx/snippets/ssl_params.conf
    owner: root
    group: root
    mode: '0644'

- name: Remove default nginx vhost
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

# ── TLS certificates ─────────────────────────────────────────

- name: Obtain TLS certificates for vhosts
  command: >
    certbot certonly --nginx
    --non-interactive
    --agree-tos
    --email {{ certbot_email }}
    -d {{ item.domain }}
    {% if certbot_staging %}--staging{% endif %}
  args:
    creates: "/etc/letsencrypt/live/{{ item.domain }}/fullchain.pem"
  loop: "{{ nginx_vhosts }}"
  when: nginx_vhosts | length > 0

- name: Setup certbot auto-renewal
  cron:
    name: "Certbot renew"
    minute: "0"
    hour: "3"
    day: "*/15"
    user: root
    job: "certbot renew --quiet --nginx >> /var/log/certbot-renew.log 2>&1"
    state: present

# ── Virtual hosts ─────────────────────────────────────────────

- name: Deploy vhost configs
  template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ item.domain }}.conf"
    owner: root
    group: root
    mode: '0644'
    validate: 'nginx -t -c /dev/stdin < %s || true'
  loop: "{{ nginx_vhosts }}"
  when: nginx_vhosts | length > 0
  notify: reload nginx

- name: Enable vhost configs
  file:
    src: "/etc/nginx/sites-available/{{ item.domain }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ item.domain }}.conf"
    state: link
  loop: "{{ nginx_vhosts }}"
  when: nginx_vhosts | length > 0
  notify: reload nginx

# ── Service ──────────────────────────────────────────────────

- name: Enable and start nginx
  service:
    name: nginx
    state: started
    enabled: yes

- name: Verify nginx config
  command: nginx -t
  changed_when: false
