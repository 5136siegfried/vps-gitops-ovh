---
# ============================================================
# ROLE: reverse_proxy
# Nginx + Certbot (Let's Encrypt) avec hardening TLS
# ============================================================

- name: Install nginx and certbot
  ansible.builtin.apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: true

- name: Deploy nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: '0644'
    validate: 'nginx -t -c %s'
  notify: Reload nginx

- name: Deploy security headers snippet
  ansible.builtin.template:
    src: security_headers.conf.j2
    dest: /etc/nginx/snippets/security_headers.conf
    owner: root
    group: root
    mode: '0644'

- name: Deploy SSL snippet
  ansible.builtin.template:
    src: ssl_params.conf.j2
    dest: /etc/nginx/snippets/ssl_params.conf
    owner: root
    group: root
    mode: '0644'

- name: Remove default nginx vhost
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Obtain TLS certificates for vhosts
  ansible.builtin.command:
    cmd: >
      certbot certonly --nginx
      --non-interactive
      --agree-tos
      --email {{ reverse_proxy_certbot_email }}
      -d {{ item.domain }}
      {{ '--staging' if reverse_proxy_certbot_staging else '' }}
    creates: "/etc/letsencrypt/live/{{ item.domain }}/fullchain.pem"
  loop: "{{ reverse_proxy_nginx_vhosts }}"
  when: reverse_proxy_nginx_vhosts | length > 0

- name: Setup certbot auto-renewal
  ansible.builtin.cron:
    name: "Certbot renew"
    minute: "0"
    hour: "3"
    day: "*/15"
    user: root
    job: "certbot renew --quiet --nginx >> /var/log/certbot-renew.log 2>&1"
    state: present

- name: Deploy vhost configs
  ansible.builtin.template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ item.domain }}.conf"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ reverse_proxy_nginx_vhosts }}"
  when: reverse_proxy_nginx_vhosts | length > 0
  notify: Reload nginx

- name: Enable vhost configs
  ansible.builtin.file:
    src: "/etc/nginx/sites-available/{{ item.domain }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ item.domain }}.conf"
    state: link
  loop: "{{ reverse_proxy_nginx_vhosts }}"
  when: reverse_proxy_nginx_vhosts | length > 0
  notify: Reload nginx

- name: Enable and start nginx
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Verify nginx config
  ansible.builtin.command:
    cmd: nginx -t
  changed_when: false
