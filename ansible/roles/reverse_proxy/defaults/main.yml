---
# Nginx
reverse_proxy_nginx_worker_processes: auto
reverse_proxy_nginx_worker_connections: 1024
reverse_proxy_nginx_keepalive_timeout: 65
reverse_proxy_nginx_client_max_body_size: "10m"
reverse_proxy_nginx_server_tokens: "off"

# Certbot
reverse_proxy_certbot_email: "admin@5136.fr"
reverse_proxy_certbot_staging: false

# Virtual hosts
reverse_proxy_nginx_vhosts: []

# Security headers
reverse_proxy_nginx_security_headers:
  X-Frame-Options: "SAMEORIGIN"
  X-Content-Type-Options: "nosniff"
  X-XSS-Protection: "1; mode=block"
  Referrer-Policy: "strict-origin-when-cross-origin"
  Permissions-Policy: "geolocation=(), microphone=(), camera=()"
