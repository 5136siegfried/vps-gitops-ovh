---
# ============================================================
# ROLE: monitoring
# Agents légers côté VPS prod — Node Exporter + cAdvisor
# ============================================================

- name: Create node_exporter user
  ansible.builtin.user:
    name: node_exporter
    system: true
    shell: /bin/false
    create_home: false

- name: Download Node Exporter
  ansible.builtin.get_url:
    url: >
      https://github.com/prometheus/node_exporter/releases/download/
      v{{ monitoring_node_exporter_version }}/
      node_exporter-{{ monitoring_node_exporter_version }}.linux-amd64.tar.gz
    dest: "/tmp/node_exporter-{{ monitoring_node_exporter_version }}.tar.gz"
    mode: '0644'

- name: Extract Node Exporter
  ansible.builtin.unarchive:
    src: "/tmp/node_exporter-{{ monitoring_node_exporter_version }}.tar.gz"
    dest: /tmp
    remote_src: true

- name: Install Node Exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ monitoring_node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: node_exporter
    group: node_exporter
    mode: '0755'
    remote_src: true
  notify: Restart node_exporter

- name: Deploy Node Exporter systemd service
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Enable and start Node Exporter
  ansible.builtin.service:
    name: node_exporter
    state: started
    enabled: true

- name: Allow Node Exporter port from monitoring VPS only
  community.general.ufw:
    rule: allow
    port: "{{ monitoring_node_exporter_port }}"
    proto: tcp
    src: "{{ monitoring_prometheus_server_ip }}"
    comment: "Prometheus scrape — monitoring VPS"

- name: Allow cAdvisor port from monitoring VPS only
  community.general.ufw:
    rule: allow
    port: "{{ monitoring_cadvisor_port }}"
    proto: tcp
    src: "{{ monitoring_prometheus_server_ip }}"
    comment: "cAdvisor scrape — monitoring VPS"

- name: Create cAdvisor directory
  ansible.builtin.file:
    path: /opt/cadvisor
    state: directory
    owner: "{{ common_deploy_user | default('deploy') }}"
    group: "{{ common_deploy_user | default('deploy') }}"
    mode: '0755'

- name: Deploy cAdvisor via Docker Compose
  ansible.builtin.template:
    src: cadvisor-compose.yml.j2
    dest: /opt/cadvisor/docker-compose.yml
    owner: "{{ common_deploy_user | default('deploy') }}"
    group: "{{ common_deploy_user | default('deploy') }}"
    mode: '0644'

- name: Start cAdvisor
  community.docker.docker_compose_v2:
    project_src: /opt/cadvisor
    state: present

- name: Deploy metrics nginx vhost
  ansible.builtin.template:
    src: metrics_vhost.conf.j2
    dest: /etc/nginx/sites-available/metrics.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reload nginx

- name: Enable metrics vhost
  ansible.builtin.file:
    src: /etc/nginx/sites-available/metrics.conf
    dest: /etc/nginx/sites-enabled/metrics.conf
    state: link
  notify: Reload nginx
