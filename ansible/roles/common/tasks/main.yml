---
# ============================================================
# ROLE: common
# Hardening de base pour un VPS OVH Ubuntu 22.04+
# ============================================================

# ── System ──────────────────────────────────────────────────

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Set timezone
  ansible.builtin.command:
    cmd: "timedatectl set-timezone {{ common_timezone }}"
  changed_when: false

- name: Set locale
  community.general.locale_gen:
    name: "{{ common_locale }}"
    state: present

- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - vim
      - htop
      - ufw
      - fail2ban
      - unattended-upgrades
      - apt-listchanges
      - logrotate
      - rsync
      - ca-certificates
      - gnupg
      - lsb-release
      - net-tools
      - jq
    state: present

# ── Unattended upgrades ─────────────────────────────────────

- name: Enable unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
      APT::Periodic::Unattended-Upgrade "1";
    owner: root
    group: root
    mode: '0644'

# ── Deploy user ─────────────────────────────────────────────

- name: Create deploy user
  ansible.builtin.user:
    name: "{{ common_deploy_user }}"
    shell: "{{ common_deploy_user_shell }}"
    groups: "{{ common_deploy_user_groups }}"
    append: true
    create_home: true
    state: present

- name: Create .ssh directory for deploy user
  ansible.builtin.file:
    path: "/home/{{ common_deploy_user }}/.ssh"
    state: directory
    owner: "{{ common_deploy_user }}"
    group: "{{ common_deploy_user }}"
    mode: '0700'

- name: Deploy authorized_keys for deploy user
  ansible.posix.authorized_key:
    user: "{{ common_deploy_user }}"
    state: present
    key: "{{ common_deploy_ssh_public_key }}"
  when: common_deploy_ssh_public_key is defined

- name: Allow deploy user to sudo without password
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ common_deploy_user }}"
    content: "{{ common_deploy_user }} ALL=(ALL) NOPASSWD:ALL\n"
    validate: 'visudo -cf %s'
    mode: '0440'

# ── SSH hardening ────────────────────────────────────────────

- name: Harden SSH configuration
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
    validate: '/usr/sbin/sshd -t -f %s'
  notify: Restart sshd

# ── UFW ─────────────────────────────────────────────────────

- name: Reset UFW to defaults
  community.general.ufw:
    state: reset

- name: Set UFW default incoming policy
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set UFW default outgoing policy
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow configured ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ common_ufw_allowed_ports }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled
    logging: 'on'

# ── Fail2ban ─────────────────────────────────────────────────

- name: Configure fail2ban
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

# ── Kernel hardening (sysctl) ────────────────────────────────

- name: Apply sysctl hardening
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - {key: net.ipv4.conf.all.rp_filter, value: "1"}
    - {key: net.ipv4.conf.default.rp_filter, value: "1"}
    - {key: net.ipv4.conf.all.accept_redirects, value: "0"}
    - {key: net.ipv6.conf.all.accept_redirects, value: "0"}
    - {key: net.ipv4.conf.all.send_redirects, value: "0"}
    - {key: net.ipv4.conf.all.accept_source_route, value: "0"}
    - {key: net.ipv4.tcp_syncookies, value: "1"}
    - {key: net.ipv4.conf.all.log_martians, value: "1"}
    - {key: net.ipv6.conf.all.disable_ipv6, value: "0"}