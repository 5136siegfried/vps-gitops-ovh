name: CI (lint + check)

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible yamllint python3-venv
          python3 -m venv /opt/ansible-lint-venv
          /opt/ansible-lint-venv/bin/pip install ansible-lint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install \
            community.general \
            community.docker \
            ansible.posix
          # Also install inside the venv so ansible-lint can resolve them
          /opt/ansible-lint-venv/bin/python -m pip install ansible-core
          /opt/ansible-lint-venv/bin/ansible-galaxy collection install \
            community.general \
            community.docker \
            ansible.posix

      - name: Yamllint
        run: |
          yamllint ansible/ -d '{
            extends: default,
            rules: {
              line-length: {max: 160},
              truthy: {allowed-values: ["true", "false"]}
            }
          }'

      - name: Ansible-lint
        run: /opt/ansible-lint-venv/bin/ansible-lint ansible/

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install \
            community.general \
            community.docker \
            ansible.posix

      - name: Ansible syntax check
        run: |
          echo "[vps]" > /tmp/ci-inventory.ini
          echo "localhost ansible_connection=local" >> /tmp/ci-inventory.ini
          ansible-playbook --syntax-check -i /tmp/ci-inventory.ini ansible/playbook.yml
